# HyprFree — include with: source = ~/.config/hyprfree/hyprland.conf
# If ~/.local/bin is not in Hyprland's PATH, use the full path instead of "hyprfree".

bind = SUPER ALT, H, exec, hyprfree nudge left
bind = SUPER ALT, J, exec, hyprfree nudge down
bind = SUPER ALT, K, exec, hyprfree nudge up
bind = SUPER ALT, L, exec, hyprfree nudge right
bind = SUPER ALT, left,  exec, hyprfree nudge left
bind = SUPER ALT, down,  exec, hyprfree nudge down
bind = SUPER ALT, up,    exec, hyprfree nudge up
bind = SUPER ALT, right, exec, hyprfree nudge right

bind = SUPER ALT, A, exec, hyprfree grow narrower
bind = SUPER ALT, D, exec, hyprfree grow wider
bind = SUPER ALT, W, exec, hyprfree grow taller
bind = SUPER ALT, S, exec, hyprfree grow shorter

bind = SUPER ALT, F, exec, hyprfree float
bind = SUPER ALT, R, exec, hyprfree tile
